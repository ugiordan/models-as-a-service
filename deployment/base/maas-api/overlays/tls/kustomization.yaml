apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../default
  - destinationrule.yaml

patches:
  - path: deployment-patch.yaml
  - path: service-patch.yaml
  - path: cronjob-cleanup-patch.yaml
  - path: networkpolicy-cleanup-patch.yaml
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: maas-api-route
    patch: |-
      # Patches HTTPRoute rules with backendRefs to use HTTPS port 8443.
      # Rule 0: /v1/models, Rule 1: /maas-api/internal (no backendRefs,
      # blocks external access), Rule 2: /maas-api/* catch-all.
      - op: replace
        path: /spec/rules/0/backendRefs/0/port
        value: 8443
      - op: replace
        path: /spec/rules/2/backendRefs/0/port
        value: 8443
  # Fix NetworkPolicy ingress podSelector - the labels transformer in 'default'
  # incorrectly adds MaaS labels to the Authorino podSelector. Authorino pods
  # only have 'authorino-resource: authorino', so we restore the correct selector.
  - target:
      kind: NetworkPolicy
      name: maas-authorino-allow
    patch: |
      - op: replace
        path: /spec/ingress/0/from/0/podSelector/matchLabels
        value:
          authorino-resource: authorino

