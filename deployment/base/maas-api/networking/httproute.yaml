apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: maas-api-route
spec:
  parentRefs:
    - name: maas-default-gateway
      namespace: openshift-ingress
  rules:
    # OpenAI-compatible /v1/models endpoint at top level
    - matches:
        - path:
            type: PathPrefix
            value: /v1/models
      backendRefs:
        - name: maas-api
          port: 8080
          weight: 100
    # Block external access to internal endpoints.
    # These endpoints (api-keys/validate, api-keys/cleanup,
    # subscriptions/select) must only be reachable via the cluster-local
    # Service by in-cluster callers (Authorino, cleanup CronJob).
    # A rule with no backendRefs causes the gateway to return a non-2xx
    # response (typically 404 or 500), preventing external traffic from
    # reaching internal handlers.
    - matches:
        - path:
            type: PathPrefix
            value: /maas-api/internal
    # All other maas-api endpoints remain under /maas-api prefix
    - matches:
        - path:
            type: PathPrefix
            value: /maas-api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: maas-api
          port: 8080
          weight: 100
