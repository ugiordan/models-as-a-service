apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: maas-gateway-route
  namespace: openshift-ingress
spec:
  # Replace with your actual hostname.
  host: maas.<cluster-domain>
  to:
    kind: Service
    # The Gateway controller creates a Service whose name is derived from the
    # Gateway name and GatewayClass name. Verify with:
    #   kubectl get svc -n openshift-ingress | grep maas-default-gateway
    name: maas-default-gateway-openshift-default
    weight: 100
  port:
    targetPort: 443
  tls:
    # Re-encrypt: the Router terminates the client TLS session and opens a new
    # TLS connection to the Gateway Service using the service-ca certificate.
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
    # Provide the service CA bundle so the router can verify the backend certificate.
    # Fetch the CA bundle with:
    #   kubectl get configmap signing-cabundle -n openshift-service-ca -o jsonpath='{.data.ca-bundle\.crt}'
    # Without this, reencrypt handshake will fail on clusters where the router
    # doesn't implicitly trust service-ca (e.g., bare-metal, disconnected).
    destinationCACertificate: |
      -----BEGIN CERTIFICATE-----
      ... (paste the service CA bundle here) ...
      -----END CERTIFICATE-----
