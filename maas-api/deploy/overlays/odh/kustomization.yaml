apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: maas-api-opendatahub

# Overlay used by the Tenant reconciler (maas-controller) to render maas-api
# platform workloads. All dynamic value injection (images, gateway config,
# namespace, audience) is handled by PostRender in Go code after kustomize build.
resources:
- ../../../../deployment/base/maas-api/overlays/tls
- ../../../../deployment/base/maas-controller/policies
- ../../../../deployment/base/payload-processing/default

namespace: opendatahub

# Strip app.kubernetes.io labels that kustomize includeSelectors injects
# into the NP's from[].podSelector. The inner kustomization (default/)
# uses includeSelectors: true for Deployment/Service selectors, but this
# also pollutes NetworkPolicy ingress selectors, making the ext_proc
# rule unmatchable (gateway pods don't have payload-processing labels).
patches:
- target:
    kind: NetworkPolicy
    name: payload-processing
  patch: |-
    - op: replace
      path: /spec/ingress/0/from/0/podSelector
      value:
        matchLabels:
          gateway.istio.io/managed: istio.io-gateway-controller

labels:
- pairs:
    app.kubernetes.io/component: api
    app.kubernetes.io/name: maas-api
